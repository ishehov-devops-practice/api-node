name: API Node CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# permissions:
#   contents: read
#   packages: write

jobs:
  validate-code:
    name: Lint, format, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup node runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check lint
        run: npm run lint

      - name: Run tests
        run: npm run test
  
